spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tiny_db?currentSchema=tiny_schema
    username: tiny_user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update  # or validate, create, create-drop depending on your needs
    properties:
      hibernate:
        default_schema: tiny_schema
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

logging:
  level:
    root: INFO
    com.jyotirmay: INFO